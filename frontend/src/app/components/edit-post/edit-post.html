<form [formGroup]="editPostForm" (ngSubmit)="onSubmit()">
  <div class="edit-post-modal">
    <div class="modal-content">
      <div class="header">
        <h2>Edit Post</h2>
        <button title="close" type="button" (click)="closeModal()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <label for="edit-title">Title</label>
      <input type="text" name="title" id="edit-title" placeholder="Enter title" formControlName="title" />
      <small class="error-msg" *ngIf="editPostForm.get('title')?.invalid && editPostForm.get('title')?.touched">
        Title must be between 5 and 15 characters.
      </small>

      <label for="edit-description">Description</label>
      <textarea placeholder="What's on your mind?" name="description" id="edit-description"
        formControlName="description"></textarea>
      <small class="error-msg"
        *ngIf="editPostForm.get('description')?.invalid && editPostForm.get('description')?.touched">
        Description must be between 10 and 30 characters.
      </small>

      <div class="field full">
        <label class="field-label">Replace Media <span class="optional">(optional)</span></label>
        <label class="media-label" for="edit-media">
          <input multiple title="media" accept="image/*,video/*" type="file" id="edit-media"
            (change)="onFileSelected($event)">
          <div class="media-circle">
            <svg viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="media-text-main"><span>Upload</span> new photos or videos</div>
          <div class="media-text-sub">Leave empty to keep current media · Max 30MB</div>
        </label>
      </div>

      @if (previews().length > 0) {
      <div class="preview-grid">
        <div class="preview-item" *ngFor="let item of previews(); let i = index">
          <button type="button" class="remove-preview-btn" (click)="removeFile(i)" title="Remove file">
            <i class="fa-solid fa-xmark"></i>
          </button>
          @if (item.type === 'image') {
          <img [src]="item.url" alt="Image preview" />
          } @else if (item.type === 'video') {
          <video [src]="item.url" controls></video>
          }
          <div class="file-name-overlay">
            <span class="file-name-tag">{{ item.name }}</span>
          </div>
        </div>
      </div>
      }

      <div class="btn-row">
        <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn-save" [disabled]="isSubmitting">
          @if (isSubmitting) {
          <span class="btn-spinner"></span>
          Saving...
          } @else {
          Save Changes
          }
        </button>
      </div>
    </div>
  </div>
</form>
