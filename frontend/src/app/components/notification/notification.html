@if (service.notification(); as note) {
  <button
    type="button"
    class="notification"
    [class.success]="note.type === 'success'"
    [class.error]="note.type === 'error'"
    [class.info]="note.type === 'info'"
    [class.warning]="note.type === 'warning'"
    (click)="service.clear()"
    aria-label="Dismiss notification"
  >
    <span class="notification-icon" aria-hidden="true">
      @if (note.type === 'success') {
        <svg viewBox="0 0 24 24">
          <path d="M20 6 9 17l-5-5" />
        </svg>
      } @else if (note.type === 'error') {
        <svg viewBox="0 0 24 24">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      } @else if (note.type === 'warning') {
        <svg viewBox="0 0 24 24">
          <path d="M12 8v5" />
          <path d="M12 17h.01" />
          <path d="M10.3 3.9 2.5 18a2 2 0 0 0 1.7 3h15.6a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24">
          <path d="M12 16v-4" />
          <path d="M12 8h.01" />
          <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>
      }
    </span>

    <span class="notification-content">
      @if (note.title) {
        <span class="notification-title">{{ note.title }}</span>
      }
      <span class="notification-message">{{ note.message }}</span>
    </span>
  </button>
}
