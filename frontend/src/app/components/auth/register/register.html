<div class="register-container">
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-header">
      <h1>Register</h1>
    </div>

    <div class="form-grid">

      <div class="field">
        <label for="firstname">First name</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input type="text" id="firstname" formControlName="firstname" placeholder="Ahmed" />
        </div>
        <small *ngIf="registerForm.get('firstname')?.invalid && registerForm.get('firstname')?.touched">
          Firstname must be between 5 and 15 characters.
        </small>
      </div>

      <div class="field">
        <label for="lastname">Last name</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input type="text" id="lastname" formControlName="lastname" placeholder="Baid" />
        </div>
        <small *ngIf="registerForm.get('lastname')?.invalid && registerForm.get('lastname')?.touched">
          Lastname must be between 5 and 15 characters.
        </small>
      </div>

      <div class="field full">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="4" />
            <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94" />
          </svg>
          <input type="text" id="username" formControlName="username" placeholder="abaid" />
        </div>
        <small *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
          Username must be between 5 and 15 characters.
        </small>
      </div>

      <div class="field full">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <input type="email" id="email" formControlName="email" placeholder="you@example.com" />
        </div>
        <small *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Email is invalid.
        </small>
      </div>

      <div class="field full">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="password" formControlName="password" placeholder="Min. 8 characters" />
        </div>
        <small *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be between 8 and 20 characters.
        </small>
      </div>

      <div class="field full">
        <label for="bio">Bio</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
          </svg>
          <textarea id="bio" formControlName="bio" placeholder="Tell us about you"></textarea>
        </div>
        <small *ngIf="registerForm.get('bio')?.invalid && registerForm.get('bio')?.touched">
          Bio must be between 10 and 100 characters.
        </small>
      </div>

      <div class="field full">
        <label>Profile photo</label>
        <label class="avatar-label" for="avatar">
          <input title="avatar" type="file" id="avatar" (change)="onFileSelected($event)">
          <div class="avatar-circle">
            <svg viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="avatar-text-main"><span>Upload</span> your photo</div>
          <div class="avatar-text-sub">PNG, JPG or WEBP · Max 5MB</div>
          <div id="avatar-name">{{ selectedFileName }}</div>
        </label>
      </div>


      <button class="submit-btn" type="submit">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Register
      </button>

    </div>

    <div class="sign-in">Already have an account? <a href="auth/login">login</a></div>
  </form>
</div>
