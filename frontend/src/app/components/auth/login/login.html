<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-header">
      <h1>Login</h1>
    </div>

    <div class="form-grid">
      <div class="field full">
        <label for="username">Username or Email</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="4" />
            <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94" />
          </svg>
          <input type="text" id="username" formControlName="login" placeholder="username or email" />
        </div>
        <small *ngIf="loginForm.get('login')?.invalid && loginForm.get('login')?.touched">
          Username or email is required.
        </small>
      </div>


      <div class="field full">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="password" formControlName="password" placeholder="password" />
        </div>
        <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required.
        </small>
      </div>

      <button class="submit-btn" type="submit">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Login
      </button>

    </div>

    <div class="sign-in">Don't have an account? <a href="auth/register">register</a></div>
  </form>
</div>
