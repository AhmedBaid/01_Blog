@if (user) {
<div class="navbar-container">
  <nav class="navbar">

    <a class="nb-brand" routerLink="/">
      <h1 class="nb-brand-name"><span>01</span>Blog</h1>
    </a>


    <div class="nb-search">
      <svg class="nb-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="search" placeholder="Search for users..." />
    </div>

    <div class="nb-actions">
      <button class="nb-create" (click)="navigateToCreatePost()">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        <span class="nb-create-text">
          Create post
        </span>
      </button>

      <button class="nb-btn nb-notif-wrap" aria-label="Notifications">
        <svg viewBox="0 0 24 24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span class="nb-notif-dot"></span>
      </button>


      <div class="nb-profile">
        @if (user.avatar) {
        <img class="nb-avatar-img" [src]="user.avatar" alt="Profile" />
        } @else {
        <div class="nb-avatar">{{ flName }}</div>
        }
        <div class="nb-profile-info">
          <div class="nb-profile-name">{{ user.firstname }} {{ user.lastname }}</div>
        </div>
      </div>
    </div>
  </nav>
</div>
}
